[[adapters]]
name = "file"
path = "file.py"
default_port = 8000
description = "Map a host file to a device"
options = { file_path = "/path/to/file" }

[[adapters]]
name = "camera"
path = "camera.py"
default_port = 9000
description = "Camera adapter"
options = { jpeg_quality = "80" }

[[adapters]]
name = "keyboard"
path = "keyboard.py"
default_port = 10000
description = "Keystroke capture"
options = {}

[[adapters]]
name = "instruction"
path = "instruction.py"
default_port = 11000
description = "Run a command on stdin, configure via options"
options = { command = "grep ncd" }

