[[adapters]]
name = "file"
path = "file.py"
default_port = 8000
description = "Map a host file to a device"
options = { file_path = "", poll_interval_ms = "200" }

[[adapters]]
name = "camera"
path = "camera.py"
default_port = 9000
description = "Camera adapter"
options = { width = "", height = "", fps = "", jpeg_quality = "80" }

[[adapters]]
name = "keyboard"
path = "keyboard.py"
default_port = 10000
description = "Keyboard adapter"
options = { listen = "true", inject = "true", suppress = "false", echo_injected = "false" }

[[adapters]]
name = "instruction"
path = "instruction.py"
default_port = 11000
description = "Grep NCD — filter lines containing ncd from input text"
options = {}

